<!DOCTYPE html>
<html>
<head>
<style>
  details {
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 4px 8px;
    margin-top: 4px;
  }
  summary {
    color: #888;
    cursor: pointer;
    font-size: 0.9em;
    padding: 2px 0;
  }
  #content {
    padding: 6px 0;
  }
  /* Tighten markdown block spacing inside the collapsed widget. */
  #content > *:first-child { margin-top: 0; }
  #content > *:last-child { margin-bottom: 0; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
</head>
<body>
<details id="wrapper">
  <summary>$summary_text</summary>
  <div id="content"></div>
</details>
<script>
  var field = record.fields["$field_name"];
  var text = (typeof field === "object" && field !== null) ? (field.text || "") : (field || "");
  // Pipeline-sourced content (publikationsbot output) is markdown with embedded
  // HTML/XML structure tags — same shape the main TextField uses via
  // use_markdown=True. Run it through marked so the widget renders identically.
  // Trust assumption: record content is first-party pipeline output (no XSS
  // sanitisation needed). Falls back to plain passthrough if the CDN load fails.
  var rendered = (typeof marked !== "undefined") ? marked.parse(text) : text;
  document.getElementById("content").innerHTML = rendered;

  // Size iframe to match content height. scrollHeight is clamped
  // to >= viewport (iframe) height, so shrink to 0 first then
  // measure — otherwise the iframe grows but never shrink on collapse.
  function resizeSelf() {
    try {
      var frame = window.frameElement;
      if (!frame) return;
      frame.style.height = "0px";
      requestAnimationFrame(function () {
        frame.style.height = document.documentElement.scrollHeight + "px";
      });
    } catch (e) {}
  }

  document.getElementById("wrapper").addEventListener("toggle", resizeSelf);
  resizeSelf();
  setTimeout(resizeSelf, 0);
  window.addEventListener("load", resizeSelf);
</script>
</body>
</html>
