<!DOCTYPE html>
<html>
<head>
<style>
  details {
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 4px 8px;
    margin-top: 4px;
  }
  summary {
    color: #888;
    cursor: pointer;
    font-size: 0.9em;
    padding: 2px 0;
  }
  #content {
    white-space: pre-wrap;
    padding: 6px 0;
  }
</style>
</head>
<body>
<details id="wrapper">
  <summary>$summary_text</summary>
  <div id="content"></div>
</details>
<script>
  var field = record.fields["$field_name"];
  var text = (typeof field === "object" && field !== null) ? (field.text || "") : (field || "");
  document.getElementById("content").textContent = text;

  // Size our own iframe to match content height. scrollHeight is clamped
  // to at least the viewport (iframe) height, so shrink to 0 first then
  // measure — otherwise the iframe can grow but never shrink on collapse.
  function resizeSelf() {
    try {
      var frame = window.frameElement;
      if (!frame) return;
      frame.style.height = "0px";
      requestAnimationFrame(function () {
        frame.style.height = document.documentElement.scrollHeight + "px";
      });
    } catch (e) {}
  }

  document.getElementById("wrapper").addEventListener("toggle", resizeSelf);
  resizeSelf();
  setTimeout(resizeSelf, 0);
  window.addEventListener("load", resizeSelf);
</script>
</body>
</html>
