# German catalog of Argilla dataset display strings.
#
# All visible strings — including the discard widget chrome, the discard
# helper-question titles, and the discard-reason option labels — are
# translated. Identities (field/question name=) and label values stay
# in English; see en.yaml for the key set every locale must define.

fields:
  retrieval:
    query: Anfrage
    chunk: Textabschnitt
    generated_answer: Generierte Antwort
    discard_flow: Diesen Datensatz verwerfen
  grounding:
    answer: Antwort
    context_set: Kontextmenge
    query: Anfrage
    discard_flow: Diesen Datensatz verwerfen
  generation:
    query: Anfrage
    answer: Antwort
    context_set: Kontextmenge
    discard_flow: Diesen Datensatz verwerfen

questions:
  retrieval:
    topically_relevant: >-
      Enthält dieser Textabschnitt Informationen, die für die Anfrage
      inhaltlich relevant sind?
    evidence_sufficient: >-
      Liefert dieser Textabschnitt ausreichende Belege, um die Anfrage zu
      beantworten?
    misleading: >-
      Könnte dieser Textabschnitt plausibel zu einer falschen oder verzerrten
      Antwort führen?
    notes: Anmerkungen (optional)
    discard_reason: Verwerfungsgrund
    discard_notes: Anmerkungen zur Verwerfung (optional)
  grounding:
    support_present: >-
      Wird mindestens eine Aussage in der Antwort durch den bereitgestellten
      Kontext gestützt?
    unsupported_claim_present: >-
      Enthält die Antwort Aussagen, die nicht durch den bereitgestellten
      Kontext gestützt werden?
    contradicted_claim_present: >-
      Widerspricht der bereitgestellte Kontext einer Aussage in der Antwort?
    source_cited: Enthält die Antwort eine Quellenangabe?
    fabricated_source: >-
      Zitiert die Antwort eine Quelle, die nicht im abgerufenen Kontext
      enthalten ist?
    notes: Anmerkungen (optional)
    discard_reason: Verwerfungsgrund
    discard_notes: Anmerkungen zur Verwerfung (optional)
  generation:
    proper_action: >-
      Hat das System die für diese Anfrage angemessene Aktion gewählt?
    response_on_topic: >-
      Geht die Antwort inhaltlich auf die Anfrage des Nutzers ein?
    helpful: >-
      Würde diese Antwort einem typischen Nutzer ermöglichen, bei seiner
      Aufgabe voranzukommen?
    incomplete: Lässt die Antwort erforderliche Teile der Anfrage unbeantwortet?
    unsafe_content: Enthält die Antwort unsichere oder richtlinienverletzende Inhalte?
    notes: Anmerkungen (optional)
    discard_reason: Verwerfungsgrund
    discard_notes: Anmerkungen zur Verwerfung (optional)

guidelines:
  retrieval: "Retrieval. TODO: Nach erster Annotationsiteration überarbeiten."
  grounding: "Grounding. TODO: Nach erster Annotationsiteration überarbeiten."
  generation: "Generation. TODO: Nach erster Annotationsiteration überarbeiten."

labels:
  yes_display: "Ja"
  no_display: "Nein"
  discard_reasons:
    invalid_or_unrealistic: Ungültiger oder unrealistischer Datensatz
    unclear: Unklarer Zusammenhang zwischen Anfrage/Kontext/Antwort
    outside_reviewer_expertise: Außerhalb meines Fachgebiets

widget:
  panel_summary: Diesen Datensatz verwerfen
  panel_help: >-
    Verwenden Sie dies, wenn der Datensatz nicht zur Annotation geeignet
    ist (z. B. ungültig, unklar oder außerhalb Ihres Fachgebiets).
  reason_label: "Grund:"
  reason_placeholder: "— auswählen —"
  notes_label: "Optionale Anmerkungen:"
  notes_placeholder: Zusätzlicher Kontext (optional)
  button_label: Verwerfen
